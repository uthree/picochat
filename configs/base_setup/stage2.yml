tokenizer: weights/tokenizer.json
output_dir: data
streaming: false # small datasets: download once, then iterate from local cache

datasets:
    # None of these five have a dedicated Hub split, so each carves its own
    # validation slice out of train (see scripts/base_setup.py
    # expand_val_fraction) instead of leaving val_bin's coverage to
    # tiny-textbooks alone -- otherwise val_loss only ever measures one of
    # the six datasets in the training mixture.
    - {
          preset: tiny-codes,
          output: tiny-codes,
          val_output: tiny-codes.val,
          val_fraction: 0.01,
      }
    - { preset: tiny-textbooks, output: tiny-textbooks }
    - { preset: tiny-textbooks, output: tiny-textbooks.val, split: test }
    - {
          preset: tiny-orca-textbooks,
          output: tiny-orca-textbooks,
          val_output: tiny-orca-textbooks.val,
          val_fraction: 0.01,
      }
    - {
          preset: textbooks,
          output: textbooks,
          val_output: textbooks.val,
          val_fraction: 0.05, # only ~1.8k docs total; 1% would be too few to be meaningful
      }
    - {
          preset: cosmopedia,
          output: cosmopedia,
          val_output: cosmopedia.val,
          val_fraction: 0.001, # ~10M docs total; 1% would be an oversized val set
      }
    - {
          preset: wikipedia-en,
          output: wikipedia-en,
          val_output: wikipedia-en.val,
          val_fraction: 0.001, # ~6.4M articles total
      }
