tokenizer: weights/tokenizer.json
output_dir: data
streaming: false # small datasets: download once, then iterate from local cache

datasets:
    - { preset: tiny-codes, output: tiny-codes }
    - { preset: tiny-textbooks, output: tiny-textbooks }
    - { preset: tiny-textbooks, output: tiny-textbooks.val, split: test }
    - { preset: tiny-ocra-textbooks, output: tiny-ocra-textbooks }
    - { preset: textbooks, output: textbooks }
    - { preset: cosmopedia, output: cosmopedia }
    - { preset: wikipedia-en, output: wikipedia-en }
