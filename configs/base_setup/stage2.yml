tokenizer: weights/tokenizer.json
output_dir: data
streaming: true
# Rows are packed to block_size+1 tokens; must match
# configs/base_train/stage2.yml's data.block_size.
block_size: 2048

datasets:
    # Stage 2 trains on wikipedia-en too, but block_size is a packing-time
    # property, so stage 1's 1024-token bins can't be reused: repack it at 2048.
    # This overwrites stage 1's copy under the shared data dir -- re-run stage 1's
    # setup to go back. The same val_fraction keeps the train/val row split
    # identical to stage 1's.
    - {
          preset: wikipedia-en,
          output: wikipedia-en,
          val_output: wikipedia-en.val,
          val_fraction: 0.001,
      }
    # FineWeb datasets are excluded by default because they are massive.
    #- { preset: fineweb-edu, output: fineweb-edu }
    #- { preset: fineweb-edu-ja, output: fineweb-edu-ja }
    #- { preset: fineweb-ja, output: fineweb-ja }
    - { preset: wikipedia-ja, output: wikipedia-ja }
    - { preset: wikipedia-de, output: wikipedia-de }
    - { preset: wikipedia-es, output: wikipedia-es }
    - { preset: wikipedia-fr, output: wikipedia-fr }
    - { preset: wikipedia-it, output: wikipedia-it }
    - { preset: wikipedia-ko, output: wikipedia-ko }
    - { preset: wikipedia-zh, output: wikipedia-zh }
    - { preset: wikipedia-ar, output: wikipedia-ar }
    - { preset: wikipedia-ru, output: wikipedia-ru }
    - { preset: wikipedia-el, output: wikipedia-el }
    - { preset: wikipedia-la, output: wikipedia-la }
    - { preset: wikipedia-ms, output: wikipedia-ms }
    - { preset: wikipedia-th, output: wikipedia-th }
