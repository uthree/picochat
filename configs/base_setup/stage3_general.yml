# Preprocess the datasets used by configs/base_train/stage3_general.yml.
#
#   python scripts/base_setup.py --config configs/base_setup/stage3_general.yml

tokenizer: weights/tokenizer.json
output_dir: data
streaming: true # wikipedia / fineweb-ja are huge; stream instead of filling the disk

# wikipedia is train-only (no validation entries). fineweb-ja has a 'test'
# split, e.g. add:
#   - {preset: fineweb-ja, output: fineweb-ja.val.bin, split: test, limit: 1000}
datasets:
    - { preset: fineweb-edu, output: fineweb-edu.bin }
    - { preset: fineweb-edu-ja, output: fineweb-edu-ja.bin }
    - { preset: wikipedia-en, output: wikipedia-en.bin }
    - { preset: wikipedia-ja, output: wikipedia-ja.bin }
    - { preset: fineweb-ja, output: fineweb-ja.bin }
