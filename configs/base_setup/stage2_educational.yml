# Preprocess the datasets used by configs/base_train/stage2_educational.yml.
#
#   python scripts/base_setup.py --config configs/base_setup/stage2_educational.yml

tokenizer: weights/tokenizer.json
output_dir: data
streaming: true # fineweb-edu(-ja) are large; stream instead of filling the disk

# None of these have a 'validation' split, so there are no validation entries.
# fineweb-edu-ja has a 'test' split, e.g. add:
#   - {preset: fineweb-edu-ja, output: fineweb-edu-ja.val.bin, split: test, limit: 1000}
datasets:
    - { preset: tiny-textbooks, output: tiny-textbooks.bin }
    - { preset: tiny-textbooks, output: tiny-textbooks.val.bin, split: test }
    - { preset: tiny-orca-textbooks, output: tiny-orca-textbooks.bin }
    - { preset: textbooks, output: textbooks.bin }
    - { preset: cosmopedia, output: cosmopedia.bin }
