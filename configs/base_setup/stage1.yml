tokenizer: weights/tokenizer.json
output_dir: data
streaming: false # small datasets: download once, then iterate from local cache
# Rows are packed to block_size+1 tokens; must match
# configs/base_train/stage1.yml's data.block_size.
block_size: 512

datasets:
    - { preset: tinystories, output: tinystories }
    - { preset: tinystories, output: tinystories.val, split: validation }
    # children-stories has no dedicated split on the Hub; carve 1% of train
    # off for validation instead (see scripts/base_setup.py expand_val_fraction)
    - {
          preset: children-stories,
          output: children-stories,
          val_output: children-stories.val,
          val_fraction: 0.01,
      }
