# Tokenizer recipe for the pico / small model presets (vocab 32k).
# Independent from the pretraining stage configs. The tokenizer wants broad
# coverage (not a curriculum), so this mixes general JP + EN text.
#
#   python scripts/train_tokenizer.py --config configs/tokenizer/pico.yml

output: weights/tokenizer.json
vocab_size: 32000

# Total characters to read, split across sources by weight (byte balancing).
# Weights are relative and get normalized, so [1,1,1,1] == [0.25]*4.
total_chars: 500000000
streaming: true

# Each entry is a preset from picochat.data.sources (or an inline
# {path, name, split, text_key}) plus a relative weight.
# JP (wikipedia-ja + fineweb-ja) and EN (wikipedia-en + cosmopedia) ~50:50.
data:
  - {preset: wikipedia-ja, weight: 1}
  - {preset: fineweb-ja, weight: 1}
  - {preset: wikipedia-en, weight: 1}
  - {preset: cosmopedia, weight: 1}
