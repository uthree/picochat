# SFT stage 1: fine-tune the final pretraining checkpoint on smoltalk-style
# chat data (see configs/sft_setup/setup.yml for the preprocessing step).
#
#   python scripts/sft_train.py --config configs/sft_train/stage1.yml

tokenizer: weights/tokenizer.json
output_dir: weights/sft-stage1
init_from: weights/stage2/last.ckpt # architecture is rebuilt from this checkpoint

# model:
#     max_seq_len: 8192 # raise to extend context length beyond the checkpoint's
#                       # (RoPE base is fixed at 1e6, no scaling needed)

data:
    data_dir: data/sft # joined with each dataset path/val_path filename below
    # weight = each source's total sampling mass regardless of its row count
    # (see scripts/sft_train.py make_dataset), not a per-example weight --
    # tune these to taste. smoltalk-multilingual spreads 1.0 across 8
    # languages; magpie-ja/aya-ko get less because they're single-language.
    datasets:
        - { path: smoltalk.pt, weight: 1.0 } # en
        - { path: smoltalk-multilingual.pt, weight: 1.0 } # es/fr/it/pt/de/ar/ru/zh
        - { path: magpie-ja.pt, weight: 0.5 } # ja
        - { path: aya-ko.pt, weight: 0.2 } # ko (small, single-turn)
    val_path: smoltalk.val.pt

optim:
    lr: 1.0e-5 # much lower than pretraining: fine-tuning, not training from scratch
    muon_lr: 0.005
    weight_decay: 0.1
    warmup_steps: 100
    max_steps: 2000

trainer:
    batch_size: 16
    accumulate: 1
    grad_clip: 1.0
    precision: bf16-mixed
    num_workers: 4
    val_check_interval: 200
    # compile: null # null=auto (compile only where torch.compile is supported); true/false to force
