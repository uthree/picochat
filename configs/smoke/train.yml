# Smoke test: tiny model, few steps. Goal is to confirm the loss goes down.

tokenizer: weights/tok-smoke.json
output_dir: weights/smoke
init_from: null

model:
    size: pico
    max_seq_len: 512
    grad_checkpoint: false
    # shrink the pico preset to a tiny model
    d_model: 256
    n_heads: 8
    n_kv_heads: 2
    n_layers: 4
    window_size: 128

data:
    data_dir: data/smoke
    block_size: 256

    datasets:
        - { path: tinystories, weight: 1.0 }
    val_bin:
        - tinystories.val

optim:
    lr: 3.0e-4
    weight_decay: 0.1
    warmup_steps: 20
    max_steps: 300

trainer:
    batch_size: 16
    accumulate: 1
    grad_clip: 1.0
    precision: bf16-mixed
    num_workers: 2
    val_check_interval: 50
    compile: false # skip torch.compile for a fast smoke run
