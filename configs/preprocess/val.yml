# Shared held-out validation set, used by every pretrain stage so val_loss is
# comparable across the curriculum (and to log generation samples).
#
# Balanced EN/JA by token volume so val_loss reflects both languages (wikitext
# alone is tiny next to a wikipedia-ja slice). EN: wikitext validation (clean,
# disjoint from train) + a wikipedia-en slice for volume; JA: a wikipedia-ja
# slice. The wikipedia slices overlap stage3 train slightly, fine for a
# monitoring signal.
#
#   python scripts/preprocess.py --config configs/preprocess/val.yml

tokenizer: weights/tokenizer.json
output_dir: data
streaming: false

datasets:
  # --- English ---
  - {path: Salesforce/wikitext, name: wikitext-2-raw-v1, split: validation, output: val-en-wikitext.bin, limit: 500}
  # stream these slices: non-streaming would download all of wikipedia for 500 docs.
  - {preset: wikipedia-en, output: val-en-wikipedia.bin, limit: 500, streaming: true}
  # --- Japanese ---
  - {preset: wikipedia-ja, output: val-ja-wikipedia.bin, limit: 500, streaming: true}
