# Preprocess the datasets used by configs/pretrain/stage1_basic.yml.
# Each entry picks its own split (default train); a validation bin is just a
# second entry pointing at a validation split. Entries whose split doesn't
# exist are skipped, so only tinystories.val.bin is actually produced here
# (children-stories has no validation split; gsm8k only has train/test).
#
#   python scripts/preprocess.py --config configs/preprocess/stage1_basic.yml

tokenizer: weights/tokenizer.json
output_dir: data
streaming: false # small datasets: download once, then iterate from local cache

datasets:
  - {preset: tinystories, output: tinystories.bin}
  - {preset: tinystories, output: tinystories.val.bin, split: validation, limit: 1000}
  - {preset: children-stories, output: children-stories.bin}
  - {preset: children-stories, output: children-stories.val.bin, split: validation, limit: 1000}
  - {preset: gsm8k, output: gsm8k.bin}
  - {preset: gsm8k, output: gsm8k.val.bin, split: validation, limit: 1000}
