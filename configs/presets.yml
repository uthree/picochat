# Model scale ladder, loaded by picochat.presets (MODEL_PRESETS /
# build_lm / estimate_preset_params).
#
# picochat is a *minimal* language-model stack you can pretrain for roughly $100
# at the smallest rung, that also scales up unchanged to much larger models. Two
# independent axes let a recipe pick size and architecture separately:
#
#   1. Total-parameter rung: 200m / 1b / 8b / 35b / 120b. Each step up is
#      roughly the next order-of-magnitude landmark in *total* params. 200m/1b
#      are the "$100-budget" end; 8b and the MoE rungs are the same code scaled.
#   2. Architecture variant at that rung, matched on *total* params (checkpoint
#      / memory footprint) so the comparison is "same budget, spent differently":
#        - <rung>            dense (no MoE)                     -- 200m / 1b / 8b
#        - <rung>-moe        LatentMoE, fine-grained, per-layer pools -- 35b / 120b
#        - <rung>-moe-shared coarse-grained, one shared pool        -- 35b / 120b
#
# Sequence mixer (all rungs): a hybrid stack interleaving, per block of
# `layers_per_block` layers, (layers_per_block - 1) Gated DeltaNet-2 linear-
# attention layers with 1 Native Sparse Attention layer as the block tail --
# a 3:1 GDN:NSA ratio at the default lpb=4 (Qwen3-Next-style).
#
#   - Gated DeltaNet-2 (arXiv:2605.22791): a recurrent linear-attention mixer with
#     a fixed-size state (no growing KV cache) that learns positions implicitly
#     from its recurrence -- so these layers use NO RoPE.
#   - Native Sparse Attention (arXiv:2502.11089): sparse softmax over a
#     compressed + top-n-selected + sliding-window set of keys, for long context
#     at a fraction of the KV cost. These layers keep *partial* RoPE
#     (rope_factor of the head dim rotated) as their positional signal.
#
# NSA hyperparameters not set here fall back to the module defaults
# (nsa_kv_heads=1, sel_block=64, n_selected=16, rope_factor=0.25); `window_size`
# is the NSA sliding-window branch. The fla Triton kernels need the NSA GQA
# group (n_heads / nsa_kv_heads) to be a multiple of 16 -- every preset keeps it
# at exactly 16 (16/1, 32/2, 64/4). GDN uses a fixed conv_size=4.
#
# Dense-only at 200m / 1b / 8b: at those scales MoE sparsity barely pays off
# (the always-on backbone -- embedding, the mixers, the dense/shared FFN -- is a
# large fraction of the model). 35b and 120b are MoE-only, where the routed pool
# dominates so each token activates well under 10% of the total.
#
# The two MoE families are deliberately different points in MoE design space:
#
#   -moe        LatentMoE (arXiv:2601.18089): experts run in a compressed
#               d_latent space (a shared compress/expand pair per layer), which
#               makes each expert cheap enough to run *fine-grained* -- many
#               small experts (small d_expert) with a high top-k (n_active 6-8).
#               Each layer owns its own pool.
#
#   -moe-shared *Coarse-grained*: fewer-but-larger experts with a low top-k
#               (n_active 2), one pool shared across every layer (share_experts,
#               MoEUT-style), no latent compression.
#
# Multi-token prediction: 8b and every larger preset carry n_mtp extra heads
# (offsets +2.., Medusa-style, reusing the shared lm head) for self-speculative
# decoding (picochat.inference.engine.generate_speculative). Counted in the total but NOT
# in the active figure. Smaller presets omit them.
#
# Sizes assume a 64k (65536) vocab with an untied lm head (embedding + head
# together are 131072*d_model params). CJK splits per-character in the tokenizer
# so the vocab needs no kanji-compound merges (see configs/tok/default.yml).
#
# Growth chain (picochat.model.grow / a config's grow_from): the dense rungs share a
# constant d_head of 64 and step d_model x2 (1024 -> 2048 -> 4096), so a trained
# rung *grows* into the next instead of training from scratch -- HyperCloning
# widens it (replicating heads, d_head fixed) then whole blocks are stacked for
# depth:  200m (1024, 8L) -> 1b (2048, 20L) -> 8b (4096, 48L). Constant d_head is
# what makes the width step function-preserving (per-head attention is bit-for-
# bit unchanged), so every width field -- n_heads, n_kv_heads, nsa_kv_heads and
# d_ffn -- also steps x2 along the chain (d_ffn is pinned to 2*d_model for that
# reason). The MoE rungs are a separate (sparse, narrow-backbone) design point,
# reached by upcycling a matching-shaped dense model (grow.upcycle_to_moe), not
# by widening 8b -- upcycling 8b's fat backbone would give a non-sparse MoE.
# Totals below are estimate_num_params() figures. The model's real vocab_size
# comes from the trained tokenizer's n_vocab at train time; these must match it.

# --------------------------------------------------------------------------
# 200M -- dense, the minimal "$100" config, and the seed of the width-growth
# chain: d_model 1024 / n_heads 16 (d_head 64), 8 layers / lpb 4 = 2 blocks
# (6 GDN + 2 NSA). Wide-and-shallow on purpose -- a 64k untied vocab spends
# ~134M of the 0.2B on the embedding + head, so little is left for depth here;
# depth arrives when it grows into 1b. Also the default target for the smoke
# test and base pretraining.
# --------------------------------------------------------------------------
200m: # ~0.22B params (dense)
    d_model: 1024
    n_layers: 8
    n_heads: 16  # d_head 64; multiple of 16 so the NSA kernel group (MQA) fits
    n_kv_heads: 4
    nsa_kv_heads: 1  # NSA group 16/1; steps x2 up the growth chain (1 -> 2 -> 4)
    vocab_size: 65536
    d_ffn: 2048  # 2*d_model; a lean SwiGLU ratio, kept x2-consistent up the chain
    layers_per_block: 4
    window_size: 256

# --------------------------------------------------------------------------
# 1B -- one width-double + a depth grow above 200m (grow_state_dict: 200m ->
# width x2 -> 8 layers @ d_model 2048 -> stack blocks -> 20 layers). d_head 64.
# --------------------------------------------------------------------------
1b: # ~1.1B params (dense)
    d_model: 2048
    n_layers: 20
    n_heads: 32  # d_head 64; NSA kernel group 32/2 = 16
    n_kv_heads: 8
    nsa_kv_heads: 2
    vocab_size: 65536
    d_ffn: 4096  # 2*d_model (x2 of 200m's 2048, for HyperCloning width growth)
    window_size: 512
    layers_per_block: 4

# --------------------------------------------------------------------------
# 8B -- a second width-double + depth grow above 1b (1b -> width x2 -> 20 layers
# @ d_model 4096 -> stack blocks -> 48 layers). d_head 64; top of the dense
# growth chain.
# --------------------------------------------------------------------------
8b: # ~8.7B params (dense; + 3 lightweight MTP heads)
    d_model: 4096
    n_layers: 48
    n_heads: 64  # d_head 64; NSA kernel group 64/4 = 16
    n_kv_heads: 16
    nsa_kv_heads: 4
    vocab_size: 65536
    d_ffn: 8192  # 2*d_model (x2 of 1b's 4096)
    window_size: 512
    layers_per_block: 4
    n_mtp: 3  # multi-token prediction heads (draft up to 4 tokens/step); 8B and up

# --------------------------------------------------------------------------
# 35B -- MoE only (no dense past 8b). Narrow backbone (d_model 2560) + small
# dense/shared FFN + a big routed pool, so per-token activation is ~7-10%.
# --------------------------------------------------------------------------
# The two 35b variants share this backbone (a "_"-prefixed key is an anchor
# carrier, not a preset -- see presets.load_presets); only the MoE fields
# differ below.
_35b-backbone: &backbone-35b
    d_model: 2560
    n_layers: 40
    n_heads: 32  # d_head 80; multiple of 16 for the NSA kernel group
    n_kv_heads: 4
    nsa_kv_heads: 2  # NSA GQA-16 (32/2)
    vocab_size: 65536
    window_size: 512
    layers_per_block: 6
    n_mtp: 3  # multi-token prediction heads (draft up to 4 tokens/step)

35b-moe: # ~36.0B total / ~2.4B active -- LatentMoE, fine-grained
    <<: *backbone-35b
    d_ffn: 1024      # small always-on dense/shared FFN (keeps active low)
    n_experts: 540   # +10 vs the freed-embedding baseline, restoring the ~35.5B rung
    n_active: 6
    d_expert: 512    # fine-grained
    d_latent: 1024   # LatentMoE: experts run in a d_model/2.5 latent space

35b-moe-shared: # ~35.8B total / ~3.3B active -- coarse-grained, shared pool
    <<: *backbone-35b
    d_ffn: 768       # small always-on dense/shared FFN
    n_experts: 1920  # +26 vs the freed-embedding baseline, restoring the ~35.5B rung
    n_active: 2
    d_expert: 2304   # coarse: ~4.5x the fine variant's experts
    share_experts: true

# --------------------------------------------------------------------------
# 120B -- MoE only. Narrow backbone (d_model 3584) + small dense/shared FFN +
# a big routed pool; per-token activation is ~5-7%.
# --------------------------------------------------------------------------
_120b-backbone: &backbone-120b
    d_model: 3584
    n_layers: 48
    n_heads: 32  # d_head 112; multiple of 16 for the NSA kernel group
    n_kv_heads: 4
    nsa_kv_heads: 2  # NSA GQA-16 (32/2)
    vocab_size: 65536
    window_size: 512
    layers_per_block: 6
    d_ffn: 1792  # small always-on dense/shared FFN
    n_mtp: 3  # multi-token prediction heads (draft up to 4 tokens/step)

120b-moe: # ~119B total / ~6.2B active -- LatentMoE, fine-grained
    <<: *backbone-120b
    n_experts: 576   # +4 vs the freed-embedding baseline, restoring the ~118B rung
    n_active: 8
    d_expert: 768    # fine-grained
    d_latent: 1792   # LatentMoE latent space (d_model/2)

120b-moe-shared: # ~119B total / ~8.1B active -- coarse-grained, shared pool
    <<: *backbone-120b
    n_experts: 2976  # +28 vs the freed-embedding baseline, restoring the ~118B rung
    n_active: 2
    d_expert: 3584   # coarse: ~4.7x the fine variant's experts (= d_model)
    share_experts: true
