# Model scale ladder, loaded by picochat.gpt (MODEL_PRESETS /
# build_lm / estimate_preset_params).
#
# Two independent axes, so a recipe can pick size and architecture separately:
#
#   1. Total-parameter rung: 200m / 1b / 8b / 35b / 120b. Each step up is
#      roughly the next order-of-magnitude landmark in *total* params.
#   2. Architecture variant at that rung, matched on *total* params (checkpoint
#      / memory footprint) so the comparison is "same budget, spent differently":
#        - <rung>            dense (no MoE)                     -- 200m / 1b / 8b
#        - <rung>-moe        LatentMoE, fine-grained, per-layer pools -- 35b / 120b
#        - <rung>-moe-shared coarse-grained, one shared pool        -- 35b / 120b
#
# Dense-only at 200m / 1b / 8b: at those scales the MoE sparsity barely pays off
# (the always-on backbone -- embedding, attention, the dense/shared FFN -- is a
# large fraction of the model, so "active" stays a high fraction of total).
# 35b and 120b are MoE-only, and there the routed pool dominates, so each token
# activates well under 10% of the total (see the active figures below).
#
# The two MoE families are deliberately different points in MoE design space:
#
#   -moe        LatentMoE (arXiv:2601.18089): experts run in a compressed
#               d_latent space (a shared compress/expand pair per layer), which
#               makes each expert cheap enough to run *fine-grained* -- many
#               small experts (small d_expert) with a high top-k (n_active 6-8).
#               Each layer owns its own pool.
#
#   -moe-shared *Coarse-grained*: fewer-but-larger experts with a low top-k
#               (n_active 2), one pool shared across every layer (share_experts,
#               MoEUT-style), no latent compression.
#
# Both MoE families use a narrow backbone with a small dense/shared FFN and a
# big routed pool, so the always-on part stays small and per-token activation is
# < 10% of total. -moe and -moe-shared match on total but differ on granularity
# (fine vs coarse), sharing (per-layer vs one pool) and hence active params.
#
# Multi-token prediction: 8b and every larger preset carry n_mtp extra output
# heads (offsets +2.., simplest "several heads" form) for self-speculative
# decoding (picochat.engine.generate_speculative). Each head is one lm-head's
# worth of params, counted in the total but NOT in the active figure -- plain
# autoregressive decoding runs only the primary head. Smaller presets omit them.
#
# Sizes assume a 128k vocab with an untied lm head (embedding + head together
# are 256000*d_model params, which dominates the small presets -- 200m is
# mostly its embeddings). Totals below are estimate_num_params() figures.

# --------------------------------------------------------------------------
# 200M -- dense, and deliberately the simplest topology: layers_per_block: 1
# makes every layer full (global) attention and its own Block-AttnRes block
# (i.e. no sliding window, no attention-residual blocking). At this scale the
# windowing/blocking machinery buys nothing, so the tiny model runs the plain
# variant. Also the default target for the smoke test and base pretraining.
# --------------------------------------------------------------------------
200m: # ~0.20B params (dense, full attention)
    d_model: 576
    n_layers: 12
    n_heads: 9
    n_kv_heads: 3
    vocab_size: 128000
    layers_per_block: 1  # full attention every layer; residual not blocked

# --------------------------------------------------------------------------
# 1B
# --------------------------------------------------------------------------
1b: # ~0.98B params (dense)
    d_model: 1536
    n_layers: 20
    n_heads: 12
    n_kv_heads: 3
    vocab_size: 128000
    window_size: 128
    layers_per_block: 4

# --------------------------------------------------------------------------
# 8B
# --------------------------------------------------------------------------
8b: # ~9.3B params (dense; ~7.8B backbone + 3 MTP heads)
    d_model: 4096
    n_layers: 32
    n_heads: 32
    n_kv_heads: 8
    vocab_size: 128000
    window_size: 256
    layers_per_block: 4
    n_mtp: 3  # multi-token prediction heads (draft up to 4 tokens/step); 8B and up

# --------------------------------------------------------------------------
# 35B -- MoE only (no dense past 8b). Narrow backbone (d_model 2560) + small
# dense/shared FFN + a big routed pool, so per-token activation is ~7-10%.
# --------------------------------------------------------------------------
35b-moe: # ~36.5B total / ~2.5B active (6.9%) -- LatentMoE, fine-grained
    d_model: 2560
    n_layers: 40
    n_heads: 20
    n_kv_heads: 4
    vocab_size: 128000
    window_size: 512
    layers_per_block: 6
    d_ffn: 1024      # small always-on dense/shared FFN (keeps active low)
    n_experts: 530
    n_active: 6
    d_expert: 512    # fine-grained
    d_latent: 1024   # LatentMoE: experts run in a d_model/2.5 latent space
    n_mtp: 3         # multi-token prediction heads (draft up to 4 tokens/step)

35b-moe-shared: # ~36.5B total / ~3.4B active (9.3%) -- coarse-grained, shared pool
    d_model: 2560
    n_layers: 40
    n_heads: 20
    n_kv_heads: 4
    vocab_size: 128000
    window_size: 512
    layers_per_block: 6
    d_ffn: 768       # small always-on dense/shared FFN
    n_experts: 1894
    n_active: 2
    d_expert: 2304   # coarse: ~4.5x the fine variant's experts
    share_experts: true
    n_mtp: 3         # multi-token prediction heads (draft up to 4 tokens/step)

# --------------------------------------------------------------------------
# 120B -- MoE only. Narrow backbone (d_model 3584) + small dense/shared FFN +
# a big routed pool; per-token activation is ~5-7%.
# --------------------------------------------------------------------------
120b-moe: # ~119B total / ~6.2B active (5.2%) -- LatentMoE, fine-grained
    d_model: 3584
    n_layers: 48
    n_heads: 28
    n_kv_heads: 4  # 28 heads: GQA groups must divide n_heads (28 % 8 != 0)
    vocab_size: 128000
    window_size: 512
    layers_per_block: 6
    d_ffn: 1792      # small always-on dense/shared FFN
    n_experts: 572
    n_active: 8
    d_expert: 768    # fine-grained
    d_latent: 1792   # LatentMoE latent space (d_model/2)
    n_mtp: 3         # multi-token prediction heads (draft up to 4 tokens/step)

120b-moe-shared: # ~119B total / ~8.1B active (6.8%) -- coarse-grained, shared pool
    d_model: 3584
    n_layers: 48
    n_heads: 28
    n_kv_heads: 4  # 28 heads: GQA groups must divide n_heads (28 % 8 != 0)
    vocab_size: 128000
    window_size: 512
    layers_per_block: 6
    d_ffn: 1792      # small always-on dense/shared FFN
    n_experts: 2948
    n_active: 2
    d_expert: 3584   # coarse: ~4.7x the fine variant's experts (= d_model)
    share_experts: true
    n_mtp: 3         # multi-token prediction heads (draft up to 4 tokens/step)
