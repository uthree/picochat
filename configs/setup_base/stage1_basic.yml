# Preprocess the datasets used by configs/pretrain/stage1_basic.yml.
# Each entry picks its own split (default train); a validation bin is just a
# second entry pointing at a validation split. Every dataset/split is checked
# before processing, so only list splits that exist: here only tinystories has
# a 'validation' split (children-stories is train-only; gsm8k has train/test).
#
#   python scripts/preprocess.py --config configs/preprocess/stage1_basic.yml

tokenizer: weights/tokenizer.json
output_dir: data
streaming: false # small datasets: download once, then iterate from local cache

datasets:
    - { preset: tinystories, output: tinystories.bin }
    - { preset: tinystories, output: tinystories.val.bin, split: validation }
    - { preset: tinystories-ja, output: tinystories-ja.bin }
    - {
          preset: tinystories-ja,
          output: tinystories-ja.val.bin,
          split: validation,
      }
    - { preset: tiny-codes, output: tiny-codes.bin }
    - { preset: children-stories, output: children-stories.bin }
    - { preset: gsm8k, output: gsm8k.bin }
    - { preset: gsm8k, output: gsm8k.val.bin, split: test }
