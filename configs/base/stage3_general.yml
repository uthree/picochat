# Curriculum stage 3 / 3: general knowledge / broad web (most diverse, least filtered).
# Warm-starts from stage 2's checkpoint.
#
# Preprocess the bins first, e.g.:
#   python scripts/base_setup.py -p wikipedia-en  -o data/wikipedia-en.bin
#   python scripts/base_setup.py -p wikipedia-ja  -o data/wikipedia-ja.bin
#   python scripts/base_setup.py -p fineweb-ja    -o data/fineweb-ja.bin
#
# Then: python scripts/base_train.py --config configs/base/stage3_general.yml

tokenizer: weights/tokenizer.json
output_dir: weights/stage3
init_from: weights/stage2/last.ckpt

model:
    size: pico
    max_seq_len: 4096
    grad_checkpoint: true

data:
    block_size: 1024
    train_bin:
        - data/tinystories.bin
        - data/tinystories-ja.bin
        - data/children-stories.bin
        - data/gsm8k.bin
        - data/tiny-textbooks.bin
        - data/tiny-orca-textbooks.bin
        - data/textbooks.bin
        - data/cosmopedia.bin
        - data/fineweb-edu.bin
        - data/fineweb-edu-ja.bin
        - data/wikipedia-en.bin
        - data/wikipedia-ja.bin
        - data/fineweb-ja.bin
    # Equal weight per dataset: without this, datasets are sampled in
    # proportion to their token count, so small datasets (e.g. gsm8k) get
    # seen far less often than large ones (e.g. fineweb-ja). Adjust the
    # relative scale to rebalance.
    train_weights:
        - 1.0 # tinystories
        - 1.0 # tinystories-ja
        - 1.0 # children-stories
        - 1.0 # gsm8k
        - 1.0 # tiny-textbooks
        - 1.0 # tiny-orca-textbooks
        - 1.0 # textbooks
        - 1.0 # cosmopedia
        - 1.0 # fineweb-edu
        - 1.0 # fineweb-edu-ja
        - 1.0 # wikipedia-en
        - 1.0 # wikipedia-ja
        - 1.0 # fineweb-ja
    val_bin:
        - data/tinystories.val.bin
        - data/tinystories-ja.val.bin
        - data/gsm8k.val.bin
        - data/tiny-textbooks.val.bin

optim:
    lr: 1.5e-4 # lower again for the final stage
    weight_decay: 0.01
    warmup_steps: 1000
    max_steps: 60000

trainer:
    batch_size: 16 # null -> auto: search for the largest power-of-2 batch size that fits the GPU
    accumulate: 4
    grad_clip: 1.0
    precision: bf16-mixed
    num_workers: 4
    val_check_interval: 1000
