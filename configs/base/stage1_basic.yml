# Curriculum stage 1 / 3: basics.
# Simplest, most basic text (kindergarten -> grade-school level) so the model
# learns fundamentals first. Mostly English (easy Japanese text is scarce).
#
# Preprocess the train + validation bins first (one command makes both):
#   python scripts/preprocess.py --config configs/preprocess/stage1_basic.yml
#
# Then: python scripts/pretrain.py --config configs/pretrain/stage1_basic.yml

tokenizer: weights/tokenizer.json
output_dir: weights/stage1
init_from: null # first stage trains from scratch

model:
    size: pico
    max_seq_len: 4096
    grad_checkpoint: true # set true to trade compute for memory (bigger models / longer seqs)

data:
    block_size: 1024
    train_bin:
        - data/tinystories.bin
        - data/tinystories-ja.bin
        - data/children-stories.bin
        - data/gsm8k.bin
        - data/tiny-codes.bin
    # Equal weight per dataset: without this, datasets are sampled in
    # proportion to their token count, so small datasets (e.g. gsm8k) get
    # seen far less often than large ones. Adjust the relative scale to
    # rebalance.
    train_weights:
        - 1.0 # tinystories
        - 1.0 # tinystories-ja
        - 1.0 # children-stories
        - 1.0 # gsm8k
        - 1.0 # tiny-code
    val_bin: # per-dataset validation splits (see configs/preprocess/stage1_basic.yml)
        - data/tinystories.val.bin
        - data/tinystories-ja.val.bin
        - data/gsm8k.val.bin
optim:
    lr: 3.0e-4
    weight_decay: 0.1
    warmup_steps: 2000
    max_steps: 20000

trainer:
    batch_size: 16 # null -> auto: search for the largest power-of-2 batch size that fits the GPU
    accumulate: 1
    grad_clip: 1.0
    precision: bf16-mixed
    num_workers: 4
    val_check_interval: 1000
    # compile: null # null=auto (compile only where torch.compile is supported); true/false to force
