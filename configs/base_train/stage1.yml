# Stage 1: single knowledge-oriented base-pretraining corpus (from scratch) --
# code + textbooks + wikipedia. The old "simple stories" and "knowledge" stages
# are merged into one (at this scale the easy-then-hard curriculum split bought
# little), and the simple children's-story data is dropped entirely (too uniform
# to be worth the tokens at 1B). The long-context multilingual stage stays
# separate (stage 2), where the context length actually changes.

tokenizer: weights/tokenizer.json
output_dir: weights/stage1
init_from: null # trains from scratch

model:
    size: 1b
    max_seq_len: 4096
    grad_checkpoint: true # set true to trade compute for memory (bigger models / longer seqs)

data:
    data_dir: data # joined with each dataset path/val_bin filename below
    block_size: 1024

    datasets:
        # knowledge-oriented mix: code + textbooks + wikipedia. The simple
        # children's-story datasets (TinyStories, children-stories) are excluded
        # -- too uniform to be worth the tokens at 1B; they stay as presets only
        # for the smoke test.
        - { path: tiny-codes, weight: 1.0 }
        - { path: python-codes, weight: 1.0 }
        - { path: the-stack-smol, weight: 1.0 }
        - { path: tiny-textbooks, weight: 1.0 }
        - { path: tiny-orca-textbooks, weight: 1.0 }
        - { path: textbooks, weight: 1.0 }
        - { path: cosmopedia, weight: 1.0 }
        - { path: wikipedia-en, weight: 1.0 }
    val_bin: # per-dataset validation splits (see configs/base_setup/stage1.yml)
        - tiny-codes.val
        - python-codes.val
        - tiny-textbooks.val
        - tiny-orca-textbooks.val
        - textbooks.val
        - cosmopedia.val
        - wikipedia-en.val
optim:
    lr: 1.0e-4
    weight_decay: 0.1
    warmup_steps: 2000
    max_steps: 100000

trainer:
    batch_size: 16
    accumulate: 1 # prioritize update count over per-step accuracy early on
    grad_clip: 1.0
    precision: bf16-mixed
    num_workers: 4
    val_check_interval: 5000
    # compile: null # null=auto (compile only where torch.compile is supported); true/false to force
