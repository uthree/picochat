# Stage 1: Mastering basic English grammar.

tokenizer: weights/tokenizer.json
output_dir: weights/stage1
init_from: null # first stage trains from scratch

model:
    size: 1b
    max_seq_len: 4096
    grad_checkpoint: true # set true to trade compute for memory (bigger models / longer seqs)

data:
    data_dir: data # joined with each dataset path/val_bin filename below
    block_size: 512

    datasets:
        - { path: tinystories, weight: 1.0 }
        - { path: children-stories, weight: 1.0 }
    val_bin: # per-dataset validation splits (see configs/base_setup/stage1.yml)
        - tinystories.val
        - children-stories.val
optim:
    lr: 1.0e-4
    weight_decay: 0.1
    warmup_steps: 2000
    max_steps: 20000

trainer:
    batch_size: 32
    accumulate: 1 # In the initial stages of training, I want to prioritize the number of parameter updates over accuracy, so I set gradient accumulation to 1.
    grad_clip: 1.0
    precision: bf16-mixed
    num_workers: 4
    val_check_interval: 2500
    # compile: null # null=auto (compile only where torch.compile is supported); true/false to force
