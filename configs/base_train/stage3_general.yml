# Curriculum stage 3 / 3: general knowledge / broad web (most diverse, least filtered).
# Warm-starts from stage 2's checkpoint.
#
# Preprocess the bins first, e.g.:
#   python scripts/base_setup.py -p wikipedia-en  -o data/wikipedia-en.bin
#   python scripts/base_setup.py -p wikipedia-ja  -o data/wikipedia-ja.bin
#   python scripts/base_setup.py -p fineweb-ja    -o data/fineweb-ja.bin
#
# Then: python scripts/base_train.py --config configs/base_train/stage3_general.yml

tokenizer: weights/tokenizer.json
output_dir: weights/stage3
init_from: weights/stage2/last.ckpt

model:
    size: pico
    max_seq_len: 4096
    grad_checkpoint: true

data:
    data_dir: data # joined with each dataset path/val_bin filename below
    block_size: 1024
    # Equal weight per dataset by default: without this, datasets are sampled
    # in proportion to their token count, so small datasets (e.g. gsm8k) get
    # seen far less often than large ones (e.g. fineweb-ja). Adjust the
    # relative scale to rebalance.
    datasets:
        - { path: tinystories.bin, weight: 1.0 }
        - { path: tinystories-ja.bin, weight: 1.0 }
        - { path: children-stories.bin, weight: 1.0 }
        - { path: gsm8k.bin, weight: 1.0 }
        - { path: tiny-textbooks.bin, weight: 1.0 }
        - { path: tiny-orca-textbooks.bin, weight: 1.0 }
        - { path: textbooks.bin, weight: 1.0 }
        - { path: cosmopedia.bin, weight: 1.0 }
        - { path: fineweb-edu.bin, weight: 1.0 }
        - { path: fineweb-edu-ja.bin, weight: 1.0 }
        - { path: wikipedia-en.bin, weight: 1.0 }
        - { path: fineweb-ja.bin, weight: 1.0 }
    val_bin:
        - tinystories.val.bin
        - tinystories-ja.val.bin
        - gsm8k.val.bin
        - tiny-textbooks.val.bin

optim:
    lr: 1.5e-4 # lower again for the final stage
    weight_decay: 0.1
    warmup_steps: 1000
    max_steps: 60000

trainer:
    batch_size: 16 # null -> auto: search for the largest power-of-2 batch size that fits the GPU
    accumulate: 1
    grad_clip: 1.0
    precision: bf16-mixed
    num_workers: 4
    val_check_interval: 1000
