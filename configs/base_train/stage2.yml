# Stage 2: Learn from a broader range of content, such as website text.
# Increasing the context length accordingly: 1024 -> 2048

tokenizer: weights/tokenizer.json
output_dir: weights/stage2
init_from: weights/stage1/last.ckpt

model:
    size: pico
    max_seq_len: 4096
    grad_checkpoint: true

data:
    data_dir: data # joined with each dataset path/val_bin filename below
    block_size: 2048

    datasets:
        - { path: fineweb-edu, weight: 1.0 }
        - { path: fineweb-edu-ja, weight: 1.0 }
        - { path: fineweb-ja, weight: 1.0 }
        - { path: wikipedia-en, weight: 10.0 }
        - { path: wikipedia-ja, weight: 1.0 }
        - { path: wikipedia-de, weight: 1.0 }
        - { path: wikipedia-es, weight: 1.0 }
        - { path: wikipedia-fr, weight: 1.0 }
        - { path: wikipedia-it, weight: 1.0 }
        - { path: wikipedia-ko, weight: 1.0 }
        - { path: wikipedia-zh, weight: 1.0 }
        - { path: wikipedia-ar, weight: 1.0 }
        - { path: wikipedia-ru, weight: 1.0 }
        - { path: wikipedia-el, weight: 1.0 }
        - { path: wikipedia-la, weight: 1.0 }
        - { path: wikipedia-ms, weight: 1.0 }
    val_bin: []
optim:
    lr: 1.0e-4
    weight_decay: 0.1
    warmup_steps: 1000
    max_steps: 100000

trainer:
    batch_size: 8 # null -> auto: search for the largest power-of-2 batch size that fits the GPU
    accumulate: 1
    grad_clip: 1.0
    precision: bf16-mixed
    num_workers: 4
    val_check_interval: 1000
