# Stage 2: Learn basic knowledge from wikipedia and textbooks.

tokenizer: weights/tokenizer.json
output_dir: weights/stage2
init_from: weights/stage1/last.ckpt
init_expand: true

model:
    size: small
    max_seq_len: 4096
    grad_checkpoint: true # set true to trade compute for memory (bigger models / longer seqs)

data:
    data_dir: data # joined with each dataset path/val_bin filename below
    block_size: 1024

    datasets:
        - { path: tiny-codes, weight: 1.0 }
        - { path: tiny-textbooks, weight: 1.0 }
        - { path: tiny-orca-textbooks, weight: 1.0 }
        - { path: textbooks, weight: 1.0 }
        - { path: cosmopedia, weight: 1.0 }
        - { path: wikipedia-en, weight: 1.0 }
    val_bin: # per-dataset validation splits (see configs/base_setup/stage1_basic.yml)
        - tiny-textbooks.val
optim:
    lr: 1.0e-4
    weight_decay: 0.1
    warmup_steps: 2000
    max_steps: 100000

trainer:
    batch_size: 16 # null -> auto: search for the largest power-of-2 batch size that fits the GPU
    accumulate: 1 # In the initial stages of training, I want to prioritize the number of parameter updates over accuracy, so I set gradient accumulation to 1.
    grad_clip: 1.0
    precision: bf16-mixed
    num_workers: 4
    val_check_interval: 1000
    # compile: null # null=auto (compile only where torch.compile is supported); true/false to force
