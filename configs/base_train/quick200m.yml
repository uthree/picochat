# Quick 200m real-data experiment: the 200m preset at block 2048 for ~6k steps.
# Goal: confirm the pipeline works on real data and the loss/benchmarks move.
tokenizer: /workspace/picochat/weights/tokenizer.json
output_dir: /workspace/picochat/weights/200m
init_from: null
model:
    size: 200m
    max_seq_len: 8192
    grad_checkpoint: false
data:
    data_dir: /workspace/picochat/data/200m
    block_size: 2048
    datasets:
        - { path: fineweb-edu, weight: 4.0 }
        - { path: cosmopedia, weight: 2.0 }
        - { path: wikipedia-en, weight: 3.0 }
        - { path: fineweb-edu-ja, weight: 2.0 }
        - { path: wikipedia-ja, weight: 2.0 }
        - { path: codeparrot-clean, weight: 3.0 }
        - { path: python-codes, weight: 1.0 }
optim:
    lr: 1.0e-4
    weight_decay: 0.1
    warmup_steps: 300
    max_steps: 6000
trainer:
    batch_size: 16
    accumulate: 1
    grad_clip: 1.0
    precision: bf16-mixed
    num_workers: 8
    val_check_interval: 1000
    compile: false
    benchmark_eval:
        tasks: [hellaswag, jcommonsenseqa]
        limit: 200
        every_n_steps: 1000
