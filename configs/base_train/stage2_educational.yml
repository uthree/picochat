# Curriculum stage 2 / 3: educational / textbook (Phi-style high pedagogical value).
# Warm-starts from stage 1's checkpoint (continual learning): weights are loaded,
# the optimizer and LR schedule restart for this stage. Japanese starts
# contributing here via fineweb-edu-ja.
#
# Preprocess the bins first, e.g.:
#   python scripts/base_setup.py -p tiny-textbooks       -o data/tiny-textbooks.bin
#   python scripts/base_setup.py -p tiny-orca-textbooks  -o data/tiny-orca-textbooks.bin
#   python scripts/base_setup.py -p textbooks            -o data/textbooks.bin
#   python scripts/base_setup.py -p cosmopedia           -o data/cosmopedia.bin
#   python scripts/base_setup.py -p fineweb-edu          -o data/fineweb-edu.bin
#   python scripts/base_setup.py -p fineweb-edu-ja       -o data/fineweb-edu-ja.bin
#
# Then: python scripts/base_train.py --config configs/base_train/stage2_educational.yml

tokenizer: weights/tokenizer.json
output_dir: weights/stage2
init_from: weights/stage1/last.ckpt

model:
    size: pico
    max_seq_len: 4096
    grad_checkpoint: true

data:
    data_dir: data # joined with each train_bin/val_bin filename below
    block_size: 1024
    train_bin:
        - tinystories.bin
        - tinystories-ja.bin
        - children-stories.bin
        - gsm8k.bin
        - tiny-textbooks.bin
        - tiny-orca-textbooks.bin
        - textbooks.bin
        - cosmopedia.bin
        - wikipedia-ja.bin
    # Equal weight per dataset: without this, datasets are sampled in
    # proportion to their token count, so small datasets get seen far less
    # often than large ones. Adjust the relative scale to rebalance.
    train_weights:
        - 1.0 # tinystories
        - 1.0 # tinystories-ja
        - 1.0 # children-stories
        - 1.0 # gsm8k
        - 1.0 # tiny-textbooks
        - 1.0 # tiny-orca-textbooks
        - 1.0 # textbooks
        - 1.0 # cosmopedia
        - 1.0 # wikipedia
    val_bin:
        - tinystories.val.bin
        - tinystories-ja.val.bin
        - gsm8k.val.bin
        - tiny-textbooks.val.bin

optim:
    lr: 2.0e-4 # slightly lower than stage 1 (continual learning)
    weight_decay: 0.1
    warmup_steps: 1000
    max_steps: 40000

trainer:
    batch_size: 16 # null -> auto: search for the largest power-of-2 batch size that fits the GPU
    accumulate: 1
    grad_clip: 1.0
    precision: bf16-mixed
    num_workers: 4
    val_check_interval: 1000
